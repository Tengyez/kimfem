<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Become Kim!</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #111; color: #eee; font-family: monospace;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 1rem; padding: 2rem;
    }
    h1 { color: #06b6d4; font-size: 1.4rem; }
    #status { font-size: 0.8rem; color: #aaa; }
    .wrapper {
      position: relative; background: #000;
      width: 640px; max-width: 100%;
    }
    #video { width: 100%; display: block; }
    #canvas {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%; pointer-events: none;
    }
    button {
      padding: 0.6rem 1.6rem; background: #7c3aed; color: #fff;
      border: none; border-radius: 8px; cursor: pointer; font-size: 0.9rem;
    }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    #loadMsg {
      position: absolute; inset: 0; background: rgba(0,0,0,0.85);
      display: flex; align-items: center; justify-content: center;
      color: #aaa; font-size: 0.85rem; z-index: 5;
    }
  </style>
</head>
<body>
  <h1>Become KIM!</h1>
  <p id="status">Loading models…</p>

  <div class="wrapper">

    <canvas id="canvas"></canvas>
    <div id="loadMsg">Loading models…</div>
  </div>

    let running = false, raf = null;

    // Load models
    (async () => {
      try {
        loadMsg.textContent = 'Loading face detector…';
        await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
        loadMsg.textContent = 'Loading landmarks…';
        await faceapi.nets.faceLandmark68TinyNet.loadFromUri(MODEL_URL);
        loadMsg.style.display = 'none';
        btn.disabled = false;
        status.textContent = 'Ready! Press Start Camera.';
      } catch(e) {
        loadMsg.textContent = 'Model load failed: ' + e.message;
        console.error(e);
      }
    })();

    btn.addEventListener('click', async () => {
      if (running) {
        running = false;
        cancelAnimationFrame(raf);
        video.srcObject?.getTracks().forEach(t => t.stop());
        video.srcObject = null;
        ctx.clearRect(0,0,canvas.width,canvas.height);
        btn.textContent = 'Start Camera';
        status.textContent = 'Stopped.';
        return;
      }
      const stream = await navigator.mediaDevices.getUserMedia({ video: true });
      video.srcObject = stream;
      await video.play();
      running = true;
      btn.textContent = 'Stop';
      loop();
    });

    async function loop() {
      if (!running) return;

      // Sync canvas size to video
      if (canvas.width !== video.videoWidth)   canvas.width  = video.videoWidth;
      if (canvas.height !== video.videoHeight) canvas.height = video.videoHeight;

      const dets = await faceapi
        .detectAllFaces(video, new faceapi.TinyFaceDetectorOptions({ inputSize: 320, scoreThreshold: 0.4 }))
        .withFaceLandmarks(true);

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // DEBUG: draw raw box so we know detection works
      // ctx.strokeStyle = 'red'; ctx.lineWidth = 2;

      for (const d of dets) {
        const box = d.detection.box;
        const lms = d.landmarks.positions;

        // Eye landmarks for tilt angle
        const le = lms[36], re = lms[45]; // outer eye corners
        const angle = Math.atan2(re.y - le.y, re.x - le.x);

        // Scale: use face box width as the driver — grows/shrinks as you move
        // Kim's face content spans cols 38-284 out of 370px total = 66% of image width
        const W = box.width / 0.66;
        const H = W * (410 / 370); // preserve aspect ratio

        // Anchor point: nose tip landmark (lms[30]) for best centering
        const nose = lms[30];

        // In kim's image, nose tip sits at ~43.5% x, ~58% y of image
        const ax = 0.435 * W;
        const ay = 0.58  * H;

        ctx.save();
        ctx.translate(nose.x, nose.y);
        ctx.rotate(angle);
        ctx.drawImage(kim, -ax, -ay, W, H);
        ctx.restore();
      }

      status.textContent = dets.length ? dets.length + ' face(s) detected' : 'No face detected';
      raf = requestAnimationFrame(loop);
    }
